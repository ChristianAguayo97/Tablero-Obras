<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tablero de Obras — San Miguel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; padding:0; background:#f1f5f9; font-family:'DM Sans',sans-serif; }
    #root { min-height:100vh; }
    .bar-hover:hover .bar-tooltip { opacity:1; transform:translateY(0); }
    .bar-tooltip { opacity:0; transform:translateY(4px); transition:all 0.2s; pointer-events:none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ── Helpers ──────────────────────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(n);
const fmtM = n => `$${(n/1_000_000).toFixed(1)}M`;
const num = v => { if(typeof v==='number') return v; return parseFloat(String(v).replace(/[$,%]/g,'').replace(',','.'))||0; };
const thumb = link => { const m=link?.match(/\/file\/d\/([^/]+)/); return m?`https://drive.google.com/thumbnail?id=${m[1]}&sz=w800`:link; };

const estadoColor = e => {
  const s=(e||'').toLowerCase();
  if(s.includes('finalizado')) return {bg:'#d1fae5',text:'#065f46',dot:'#10b981'};
  if(s.includes('ejecuci')) return {bg:'#fef3c7',text:'#92400e',dot:'#f59e0b'};
  return {bg:'#f1f5f9',text:'#475569',dot:'#94a3b8'};
};
const proyEstado = ocs => {
  const pp=ocs.filter(o=>o.adjudicado>0).map(o=>o.porcentaje);
  if(!pp.length) return 'En Gestión';
  const avg=pp.reduce((a,b)=>a+b,0)/pp.length;
  if(avg>=1) return 'Finalizado';
  if(avg>0) return 'En Ejecución';
  return 'En Gestión';
};

// ── Íconos SVG ────────────────────────────────────────────────────────────────
const Ico = ({d,size=18,stroke=2}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;
const IcoHat = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2H2v2z"/><path d="M20 15a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v1h16v-1z"/><path d="M12 2a7 7 0 0 0-7 7v1h14V9a7 7 0 0 0-7-7z"/></svg>;
const IcoBack = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>;
const IcoExt = ({size=14}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;
const IcoCam = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>;
const IcoChev = ({open}) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{transform:open?'rotate(180deg)':'rotate(0deg)',transition:'transform 0.2s'}}><polyline points="6 9 12 15 18 9"/></svg>;

// ── Gráfico de barras CSS puro ────────────────────────────────────────────────
function BarChart({data}) {
  if(!data||!data.length) return null;
  const max = Math.max(...data.map(d=>d.monto));
  return (
    <div style={{display:'flex',alignItems:'flex-end',gap:'8px',height:'180px',padding:'8px 0 24px'}}>
      {data.map((d,i) => {
        const h = Math.max((d.monto/max)*100,3);
        const isLast = i===data.length-1;
        return (
          <div key={i} className="bar-hover" style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',height:'100%',justifyContent:'flex-end',position:'relative'}}>
            <div className="bar-tooltip" style={{position:'absolute',bottom:'100%',marginBottom:'6px',background:'#1e293b',color:'white',padding:'6px 10px',borderRadius:'8px',fontSize:'11px',fontWeight:700,whiteSpace:'nowrap',zIndex:10}}>
              <div style={{color:'#94a3b8',marginBottom:'2px'}}>{d.name}</div>
              <div style={{color:'#38bdf8'}}>{fmt(d.monto)}</div>
              <div style={{position:'absolute',top:'100%',left:'50%',transform:'translateX(-50%)',borderLeft:'5px solid transparent',borderRight:'5px solid transparent',borderTop:'5px solid #1e293b'}}></div>
            </div>
            <div style={{width:'100%',height:`${h}%`,background:isLast?'#0ea5e9':'#7dd3fc',borderRadius:'6px 6px 0 0',transition:'background 0.2s'}}></div>
            <div style={{marginTop:'6px',fontSize:'10px',fontWeight:700,color:'#64748b',textAlign:'center'}}>{d.name}</div>
          </div>
        );
      })}
    </div>
  );
}

// ── Header ────────────────────────────────────────────────────────────────────
function Header({onBack,titulo,estado}) {
  const col = estado ? estadoColor(estado) : null;
  return (
    <header style={{background:'#0c2a3a',color:'white',position:'sticky',top:0,zIndex:40,boxShadow:'0 2px 8px rgba(0,0,0,0.2)'}}>
      <div style={{maxWidth:'1200px',margin:'0 auto',padding:'14px 24px',display:'flex',alignItems:'center',gap:'12px'}}>
        {onBack && (
          <button onClick={onBack} style={{background:'none',border:'none',color:'white',cursor:'pointer',padding:'6px',borderRadius:'10px',display:'flex',alignItems:'center'}} onMouseOver={e=>e.currentTarget.style.background='rgba(14,165,233,0.2)'} onMouseOut={e=>e.currentTarget.style.background='none'}>
            <IcoBack/>
          </button>
        )}
        <div style={{background:'#0ea5e9',padding:'8px',borderRadius:'10px',display:'flex'}}><IcoHat/></div>
        <div>
          <div style={{fontSize:'10px',fontWeight:700,color:'#7dd3fc',letterSpacing:'0.1em',textTransform:'uppercase'}}>Municipalidad de San Miguel</div>
          <div style={{fontSize:'14px',fontWeight:700,lineHeight:1.3}}>{titulo||'Secretaría de Obras y Espacios Públicos'}</div>
        </div>
        {col && estado && (
          <div style={{marginLeft:'auto',background:col.bg,color:col.text,border:`1px solid ${col.dot}40`,padding:'5px 12px',borderRadius:'999px',fontSize:'11px',fontWeight:700,display:'flex',alignItems:'center',gap:'6px'}}>
            <span style={{width:'6px',height:'6px',borderRadius:'50%',background:col.dot,display:'inline-block'}}></span>{estado}
          </div>
        )}
        {!onBack && (
          <div style={{marginLeft:'auto',background:'rgba(14,165,233,0.1)',border:'1px solid rgba(14,165,233,0.2)',padding:'6px 16px',borderRadius:'999px',fontSize:'11px',fontWeight:600}}>
            Tablero de Control Abierto
          </div>
        )}
      </div>
    </header>
  );
}

// ── Footer ────────────────────────────────────────────────────────────────────
function Footer() {
  return (
    <footer style={{background:'#0c2a3a',color:'#64748b',padding:'32px 24px',marginTop:'48px',textAlign:'center'}}>
      <div style={{fontWeight:700,color:'white',marginBottom:'6px'}}>Secretaría de Obras y Espacios Públicos — San Miguel</div>
      <div style={{fontSize:'12px',color:'#164e63'}}>Datos extraídos automáticamente de Actas de Medición y Certificados oficiales. Acceso público irrestricto.</div>
    </footer>
  );
}

// ── Tarjeta KPI ───────────────────────────────────────────────────────────────
function KPI({label,value,accent}) {
  return (
    <div style={{background:'white',borderRadius:'16px',border:'1px solid #e2e8f0',borderBottom:`4px solid ${accent}`,padding:'20px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
      <div style={{fontSize:'10px',fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:'6px'}}>{label}</div>
      <div style={{fontSize:'22px',fontWeight:800,color:'#0f172a'}}>{value}</div>
    </div>
  );
}

// ── Vista Índice ──────────────────────────────────────────────────────────────
function IndexView({tablero,onSelect}) {
  return (
    <div style={{minHeight:'100vh'}}>
      <Header/>
      <div style={{maxWidth:'1200px',margin:'0 auto',padding:'40px 24px'}}>
        <div style={{marginBottom:'32px'}}>
          <h2 style={{fontSize:'28px',fontWeight:800,color:'#0f172a',margin:'0 0 4px'}}>Obras en curso</h2>
          <p style={{color:'#64748b',fontSize:'14px',margin:0}}>{tablero.length} proyecto(s) — hacé clic para ver el detalle</p>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:'20px'}}>
          {tablero.map(proy => {
            const estado = proyEstado(proy.ocs);
            const col = estadoColor(estado);
            const adj = proy.ocs.reduce((s,o)=>s+o.adjudicado,0);
            const pag = proy.ocs.reduce((s,o)=>s+o.pagado,0);
            const pct = adj>0?(pag/adj)*100:0;
            const presup = num(proy.presupuesto);
            return (
              <button key={proy.cat_programatica} onClick={()=>onSelect(proy)}
                style={{textAlign:'left',background:'white',borderRadius:'20px',border:'1px solid #e2e8f0',padding:'24px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)',cursor:'pointer',transition:'all 0.2s',width:'100%'}}
                onMouseOver={e=>{e.currentTarget.style.boxShadow='0 8px 24px rgba(14,165,233,0.12)';e.currentTarget.style.borderColor='#7dd3fc';}}
                onMouseOut={e=>{e.currentTarget.style.boxShadow='0 1px 3px rgba(0,0,0,0.06)';e.currentTarget.style.borderColor='#e2e8f0';}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:'16px',alignItems:'flex-start'}}>
                  <span style={{fontFamily:'DM Mono,monospace',fontSize:'11px',fontWeight:700,background:'#f8fafc',border:'1px solid #e2e8f0',color:'#64748b',padding:'3px 8px',borderRadius:'6px'}}>{proy.cat_programatica}</span>
                  <span style={{background:col.bg,color:col.text,border:`1px solid ${col.dot}40`,padding:'3px 10px',borderRadius:'999px',fontSize:'11px',fontWeight:700,display:'flex',alignItems:'center',gap:'5px'}}>
                    <span style={{width:'6px',height:'6px',borderRadius:'50%',background:col.dot}}></span>{estado}
                  </span>
                </div>
                <div style={{fontWeight:700,fontSize:'15px',color:'#0f172a',marginBottom:'16px',lineHeight:1.4}}>{proy.nombre_proyecto}</div>
                <div style={{marginBottom:'12px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:'11px',color:'#94a3b8',marginBottom:'6px'}}>
                    <span>Avance financiero</span>
                    <span style={{fontWeight:700,color:'#0ea5e9'}}>{pct.toFixed(0)}%</span>
                  </div>
                  <div style={{background:'#f1f5f9',borderRadius:'999px',height:'6px',overflow:'hidden'}}>
                    <div style={{background:'#0ea5e9',height:'100%',borderRadius:'999px',width:`${Math.min(pct,100)}%`,transition:'width 0.6s'}}></div>
                  </div>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:'11px',color:'#94a3b8',borderTop:'1px solid #f1f5f9',paddingTop:'12px'}}>
                  <span>Presupuesto: <b style={{color:'#475569'}}>{fmtM(presup)}</b></span>
                  <span>Pagado: <b style={{color:'#0ea5e9'}}>{fmtM(pag)}</b></span>
                </div>
              </button>
            );
          })}
        </div>
      </div>
      <Footer/>
    </div>
  );
}

// ── Vista Detalle ─────────────────────────────────────────────────────────────
function DetalleView({proyecto,onBack}) {
  const [ocIdx,setOcIdx] = useState(0);
  const [cerActivo,setCerActivo] = useState(null);
  const [fotoModal,setFotoModal] = useState(null);

  const oc = proyecto.ocs[ocIdx];
  const historial = (oc.historial_cer||[]).filter(h=>h.total_importe_mes>0);
  const items = oc.items||[];
  const adj = proyecto.ocs.reduce((s,o)=>s+o.adjudicado,0);
  const pag = proyecto.ocs.reduce((s,o)=>s+o.pagado,0);
  const pctFin = adj>0?(pag/adj)*100:0;
  const presup = num(proyecto.presupuesto);
  const estado = proyEstado(proyecto.ocs);
  const circum = 414.69;

  const card = {background:'white',borderRadius:'20px',border:'1px solid #e2e8f0',padding:'24px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)',marginBottom:'0'};
  const labelSm = {fontSize:'10px',fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:'4px'};

  return (
    <div style={{minHeight:'100vh'}}>
      <Header onBack={onBack} titulo={proyecto.nombre_proyecto} estado={estado}/>
      <div style={{maxWidth:'1200px',margin:'0 auto',padding:'32px 24px'}}>

        {/* Título */}
        <div style={{marginBottom:'28px'}}>
          <span style={{fontFamily:'DM Mono,monospace',fontSize:'11px',background:'white',border:'1px solid #e2e8f0',color:'#64748b',padding:'3px 8px',borderRadius:'6px',display:'inline-block',marginBottom:'10px'}}>{proyecto.cat_programatica}</span>
          <h2 style={{fontSize:'32px',fontWeight:800,color:'#0f172a',margin:'0 0 8px',lineHeight:1.2}}>{proyecto.nombre_proyecto}</h2>
          {oc.descripcion && <p style={{color:'#64748b',margin:0,fontSize:'15px'}}>{oc.descripcion}</p>}
        </div>

        {/* KPIs */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'12px',marginBottom:'24px'}}>
          <KPI label="Presupuesto" value={fmtM(presup)} accent="#94a3b8"/>
          <KPI label="Adjudicado" value={fmtM(adj)} accent="#3b82f6"/>
          <KPI label="Pagado" value={fmtM(pag)} accent="#0ea5e9"/>
          <KPI label="Avance Financiero" value={`${pctFin.toFixed(0)}%`} accent="#6366f1"/>
        </div>

        {/* Selector OC */}
        {proyecto.ocs.length>1 && (
          <div style={{display:'flex',gap:'8px',marginBottom:'20px',flexWrap:'wrap'}}>
            {proyecto.ocs.map((o,i)=>(
              <button key={o.oc} onClick={()=>{setOcIdx(i);setCerActivo(null);}}
                style={{padding:'8px 16px',borderRadius:'12px',border:`1px solid ${ocIdx===i?'#0ea5e9':'#e2e8f0'}`,background:ocIdx===i?'#0ea5e9':'white',color:ocIdx===i?'white':'#475569',fontWeight:700,fontSize:'13px',cursor:'pointer',fontFamily:'inherit'}}>
                OC {o.oc}
              </button>
            ))}
          </div>
        )}

        {/* Layout 2 columnas */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:'20px',alignItems:'start'}}>

          {/* Columna principal */}
          <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>

            {/* Info OC */}
            <div style={card}>
              <div style={{fontWeight:700,fontSize:'15px',color:'#0f172a',marginBottom:'16px',paddingBottom:'12px',borderBottom:'1px solid #f1f5f9'}}>
                Orden de Compra — {oc.oc}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
                {[
                  {label:'Proveedor',val:oc.proveedor||'—'},
                  {label:'Estado',val:oc.estado},
                  ...(oc.fecha_inicio?[{label:'Inicio',val:oc.fecha_inicio}]:[]),
                  ...(oc.fecha_fin_estimada?[{label:'Fin estimado',val:oc.fecha_fin_estimada}]:[]),
                ].map(f=>(
                  <div key={f.label} style={{background:'#f8fafc',borderRadius:'12px',padding:'14px'}}>
                    <div style={labelSm}>{f.label}</div>
                    <div style={{fontWeight:600,color:'#1e293b',fontSize:'13px',lineHeight:1.4}}>{f.val}</div>
                  </div>
                ))}
              </div>
              {oc.inspector && (
                <div style={{marginTop:'16px',paddingTop:'14px',borderTop:'1px solid #f1f5f9',display:'flex',alignItems:'center',gap:'12px'}}>
                  <div style={{background:'#e0f2fe',color:'#0369a1',padding:'8px',borderRadius:'10px',display:'flex'}}><IcoHat size={16}/></div>
                  <div>
                    <div style={labelSm}>Inspector de obra</div>
                    <div style={{fontWeight:600,color:'#1e293b'}}>{oc.inspector}</div>
                  </div>
                </div>
              )}
            </div>

            {/* Gráfico */}
            {historial.length>0 && (
              <div style={card}>
                <div style={{fontWeight:700,fontSize:'15px',color:'#0f172a',marginBottom:'16px',paddingBottom:'12px',borderBottom:'1px solid #f1f5f9'}}>
                  💰 Importe ejecutado por certificado
                </div>
                <BarChart data={historial.map(h=>({name:h.certificado,monto:h.total_importe_mes}))}/>
              </div>
            )}

            {/* Items */}
            {items.length>0 && (
              <div style={card}>
                <div style={{fontWeight:700,fontSize:'15px',color:'#0f172a',marginBottom:'20px',paddingBottom:'12px',borderBottom:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span>📊 Avance físico por ítem</span>
                  <span style={{fontFamily:'DM Mono,monospace',fontSize:'11px',color:'#94a3b8'}}>{oc.certificado}</span>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
                  {items.map(it => {
                    const acum = num(it.Porcentaje_Acumulado);
                    const ant = num(it.Porcentaje_anterior);
                    return (
                      <div key={it.Item}>
                        <div style={{display:'flex',justifyContent:'space-between',fontSize:'12px',marginBottom:'6px'}}>
                          <span style={{color:'#475569',fontWeight:600}}>
                            <span style={{fontFamily:'DM Mono,monospace',color:'#94a3b8',marginRight:'6px'}}>#{it.Item}</span>
                            {it.Denominacion}
                          </span>
                          <span style={{fontWeight:800,color:'#0ea5e9',marginLeft:'12px',whiteSpace:'nowrap'}}>{acum.toFixed(0)}%</span>
                        </div>
                        <div style={{position:'relative',height:'10px',background:'#f1f5f9',borderRadius:'999px',overflow:'hidden'}}>
                          <div style={{position:'absolute',left:0,top:0,height:'100%',background:'#bfdbfe',borderRadius:'999px',width:`${ant}%`}}></div>
                          <div style={{position:'absolute',left:0,top:0,height:'100%',background:acum>=100?'#0ea5e9':'#38bdf8',borderRadius:'999px',width:`${acum}%`}}></div>
                        </div>
                        <div style={{display:'flex',gap:'16px',marginTop:'4px',fontSize:'10px',color:'#94a3b8'}}>
                          <span>Ant: {ant.toFixed(0)}%</span>
                          <span>Mes: {num(it.Porcentaje_en_mes).toFixed(0)}%</span>
                          <span>Acum: <b style={{color:'#0ea5e9'}}>{acum.toFixed(0)}%</b></span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Historial certificados */}
            {(oc.historial_cer||[]).length>0 && (
              <div style={card}>
                <div style={{fontWeight:700,fontSize:'15px',color:'#0f172a',marginBottom:'16px',paddingBottom:'12px',borderBottom:'1px solid #f1f5f9'}}>
                  📋 Historial de certificados
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                  {oc.historial_cer.map(cer => {
                    const isOpen = cerActivo===cer.certificado;
                    const fotos = cer.fotos||[];
                    return (
                      <div key={cer.certificado} style={{border:`1px solid ${isOpen?'#7dd3fc':'#f1f5f9'}`,borderRadius:'14px',background:isOpen?'#f0f9ff':'#fafafa',overflow:'hidden',transition:'all 0.2s'}}>
                        <button onClick={()=>setCerActivo(isOpen?null:cer.certificado)}
                          style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 16px',background:'none',border:'none',cursor:'pointer',textAlign:'left',fontFamily:'inherit'}}>
                          <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
                            <span style={{fontFamily:'DM Mono,monospace',fontSize:'11px',fontWeight:700,padding:'3px 10px',borderRadius:'8px',background:isOpen?'#0ea5e9':'white',color:isOpen?'white':'#475569',border:`1px solid ${isOpen?'#0ea5e9':'#e2e8f0'}`}}>
                              {cer.certificado}
                            </span>
                            <div>
                              <div style={{fontWeight:700,fontSize:'14px',color:'#0f172a'}}>{fmt(cer.total_importe_mes)}</div>
                              <div style={{fontSize:'11px',color:'#94a3b8'}}>Acum: {fmt(cer.total_importe_acum)} · {cer.total_pct_acum}%</div>
                            </div>
                          </div>
                          <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                            {fotos.length>0 && (
                              <span style={{display:'flex',alignItems:'center',gap:'4px',fontSize:'11px',fontWeight:700,color:'#0ea5e9',background:'#e0f2fe',padding:'3px 8px',borderRadius:'8px',border:'1px solid #bae6fd'}}>
                                <IcoCam/> {fotos.length}
                              </span>
                            )}
                            {cer.link_cer && (
                              <a href={cer.link_cer} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}
                                style={{display:'flex',alignItems:'center',gap:'4px',fontSize:'11px',fontWeight:700,color:'#0ea5e9',background:'#e0f2fe',padding:'3px 10px',borderRadius:'8px',border:'1px solid #bae6fd',textDecoration:'none'}}>
                                <IcoExt size={11}/> CER
                              </a>
                            )}
                            <IcoChev open={isOpen}/>
                          </div>
                        </button>
                        {isOpen && (
                          <div style={{padding:'0 16px 16px'}}>
                            {fotos.length>0 ? (
                              <>
                                <div style={{fontSize:'10px',fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:'10px'}}>Registro fotográfico</div>
                                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px'}}>
                                  {fotos.map((f,fi)=>(
                                    <button key={fi} onClick={()=>setFotoModal(f)}
                                      style={{position:'relative',aspectRatio:'4/3',overflow:'hidden',borderRadius:'10px',border:'1px solid #e2e8f0',cursor:'pointer',background:'#f1f5f9',padding:0}}>
                                      <img src={thumb(f.link)} alt={f.nombre} style={{width:'100%',height:'100%',objectFit:'cover'}}
                                        onError={e=>{e.target.parentElement.innerHTML='<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#94a3b8">Sin vista previa</div>';}}/>
                                    </button>
                                  ))}
                                </div>
                              </>
                            ) : (
                              <div style={{fontSize:'12px',color:'#94a3b8',fontStyle:'italic'}}>Sin fotos para este certificado.</div>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>

          {/* Columna lateral */}
          <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>

            {/* Círculo avance */}
            <div style={{...card,textAlign:'center'}}>
              <div style={{fontWeight:700,fontSize:'15px',color:'#0f172a',marginBottom:'20px'}}>Avance Financiero</div>
              <div style={{position:'relative',display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
                <svg width="160" height="160" style={{transform:'rotate(-90deg)'}}>
                  <circle cx="80" cy="80" r="66" strokeWidth="12" fill="none" stroke="#e2e8f0"/>
                  <circle cx="80" cy="80" r="66" strokeWidth="12" fill="none" stroke="#0ea5e9"
                    strokeDasharray={circum} strokeDashoffset={circum-(circum*Math.min(pctFin,100))/100}
                    strokeLinecap="round"/>
                </svg>
                <div style={{position:'absolute',textAlign:'center'}}>
                  <div style={{fontSize:'36px',fontWeight:900,color:'#0f172a'}}>{pctFin.toFixed(0)}%</div>
                  <div style={{fontSize:'10px',fontWeight:700,color:'#94a3b8',textTransform:'uppercase'}}>pagado</div>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginTop:'16px'}}>
                <div style={{background:'#eff6ff',borderRadius:'12px',padding:'12px'}}>
                  <div style={{fontSize:'10px',fontWeight:700,color:'#93c5fd',textTransform:'uppercase'}}>Adjudicado</div>
                  <div style={{fontWeight:800,color:'#1d4ed8',fontSize:'13px'}}>{fmtM(adj)}</div>
                </div>
                <div style={{background:'#e0f2fe',borderRadius:'12px',padding:'12px'}}>
                  <div style={{fontSize:'10px',fontWeight:700,color:'#7dd3fc',textTransform:'uppercase'}}>Pagado</div>
                  <div style={{fontWeight:800,color:'#0369a1',fontSize:'13px'}}>{fmtM(pag)}</div>
                </div>
              </div>
            </div>

            {/* OCs */}
            {proyecto.ocs.length>1 && (
              <div style={card}>
                <div style={{fontWeight:700,fontSize:'15px',color:'#0f172a',marginBottom:'14px'}}>Órdenes de Compra</div>
                <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                  {proyecto.ocs.map((o,i)=>{
                    const p=o.adjudicado>0?(o.pagado/o.adjudicado)*100:0;
                    return (
                      <button key={o.oc} onClick={()=>setOcIdx(i)}
                        style={{textAlign:'left',background:ocIdx===i?'#f0f9ff':'#fafafa',border:`1px solid ${ocIdx===i?'#7dd3fc':'#f1f5f9'}`,borderRadius:'12px',padding:'12px',cursor:'pointer',fontFamily:'inherit',transition:'all 0.2s'}}>
                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'6px'}}>
                          <span style={{fontFamily:'DM Mono,monospace',fontSize:'11px',fontWeight:700,color:'#475569'}}>{o.oc}</span>
                          <span style={{fontSize:'11px',fontWeight:800,color:'#0ea5e9'}}>{p.toFixed(0)}%</span>
                        </div>
                        <div style={{fontSize:'11px',color:'#94a3b8',marginBottom:'8px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{o.proveedor||'Sin proveedor'}</div>
                        <div style={{background:'#e2e8f0',borderRadius:'999px',height:'4px',overflow:'hidden'}}>
                          <div style={{background:'#0ea5e9',height:'100%',borderRadius:'999px',width:`${Math.min(p,100)}%`}}></div>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Link certificado */}
            {oc.link_certificado && (
              <a href={oc.link_certificado} target="_blank" rel="noreferrer"
                style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',background:'#0ea5e9',color:'white',fontWeight:700,padding:'14px',borderRadius:'14px',textDecoration:'none',fontSize:'14px',boxShadow:'0 4px 12px rgba(14,165,233,0.3)',transition:'background 0.2s'}}
                onMouseOver={e=>e.currentTarget.style.background='#0284c7'} onMouseOut={e=>e.currentTarget.style.background='#0ea5e9'}>
                <IcoExt/> Ver certificado en Drive
              </a>
            )}
          </div>
        </div>
      </div>

      {/* Modal foto */}
      {fotoModal && (
        <div onClick={()=>setFotoModal(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}}>
          <div onClick={e=>e.stopPropagation()} style={{position:'relative',maxWidth:'800px',width:'100%'}}>
            <img src={thumb(fotoModal.link)} alt={fotoModal.nombre} style={{width:'100%',borderRadius:'16px',boxShadow:'0 24px 48px rgba(0,0,0,0.4)'}}/>
            <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'16px',background:'linear-gradient(to top,rgba(0,0,0,0.7),transparent)',borderRadius:'0 0 16px 16px',display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
              <span style={{color:'white',fontWeight:700}}>{fotoModal.nombre}</span>
              <a href={fotoModal.link} target="_blank" rel="noreferrer"
                style={{color:'white',background:'rgba(255,255,255,0.2)',padding:'6px 14px',borderRadius:'8px',fontSize:'13px',fontWeight:600,textDecoration:'none',display:'flex',alignItems:'center',gap:'6px'}}>
                <IcoExt/> Drive
              </a>
            </div>
            <button onClick={()=>setFotoModal(null)}
              style={{position:'absolute',top:'12px',right:'12px',background:'rgba(0,0,0,0.5)',border:'none',color:'white',width:'32px',height:'32px',borderRadius:'50%',fontSize:'18px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
          </div>
        </div>
      )}
      <Footer/>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [tablero,setTablero] = useState(null);
  const [activo,setActivo] = useState(null);

  useEffect(()=>{
    fetch('tablero.json')
      .then(r=>{ if(!r.ok) throw new Error('No se pudo cargar tablero.json'); return r.json(); })
      .then(data=>setTablero(data))
      .catch(err=>{ console.error(err); setTablero([]); });
  },[]);

  if(!tablero) return (
    <div style={{minHeight:'100vh',background:'#f1f5f9',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'white',borderRadius:'24px',padding:'48px',boxShadow:'0 8px 32px rgba(0,0,0,0.08)',textAlign:'center',border:'1px solid #e2e8f0'}}>
        <div style={{background:'#0ea5e9',padding:'16px',borderRadius:'50%',display:'inline-flex',marginBottom:'20px'}}>
          <IcoHat size={28}/>
        </div>
        <div style={{fontSize:'20px',fontWeight:800,color:'#0f172a',marginBottom:'8px'}}>Cargando Tablero</div>
        <div style={{color:'#94a3b8',fontSize:'14px'}}>Procesando certificados y actas de medición...</div>
        <div style={{width:'200px',height:'4px',background:'#e2e8f0',borderRadius:'999px',margin:'20px auto 0',overflow:'hidden'}}>
          <div style={{background:'#0ea5e9',height:'100%',width:'60%',borderRadius:'999px',animation:'pulse 1.5s ease-in-out infinite'}}></div>
        </div>
      </div>
    </div>
  );

  if(activo) return <DetalleView proyecto={activo} onBack={()=>setActivo(null)}/>;
  return <IndexView tablero={tablero} onSelect={setActivo}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
