<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tablero de Obras — San Miguel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
  <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; padding: 0; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="ObrasDashboard.jsx" data-type="module"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const interval = setInterval(() => {
        if (window.App) {
          clearInterval(interval);
          ReactDOM.createRoot(document.getElementById('root')).render(
            React.createElement(window.App)
          );
        }
      }, 100);
    });
  </script>
</body>
</html>
